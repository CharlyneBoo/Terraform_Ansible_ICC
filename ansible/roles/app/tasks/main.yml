---
- name: Install python
  ansible.builtin.apt:
    name: 
      - python3-pip
      - python3-venv
      - libpq-dev
    state: present
    update_cache: yes


- name: Create app's folder
  ansible.builtin.file:
    path: "{{app_directory}}"
    state: directory

- name: Copy python for vm
  ansible.builtin.template:
    src: ../templates/app.py.j2
    dest: "{{ app_directory }}/app.py"

- name: Create and install virtual envirennement 
  ansible.builtin.pip:
    name:
      - flask
      - gunicorn
      - psycopg2-binary
    virtualenv: "{{ app_directory }}/venv"
    virtualenv_command: python3 -m venv

- name: Create system for flask
  ansible.builtin.template:
    src: ../templates/flaskapp.service.j2 
    dest: /etc/systemd/system/flaskapp.service

- name: Start and active Flask
  ansible.builtin.systemd:
    name: flaskapp
    state: restarted  
    enabled: true
    daemon_reload: true

- name: GET to API
  ansible.builtin.uri:
    url: "http://localhost:{{ app_port }}/"
    method: GET
    return_content: true
  register: api_result

- name: Afficher le résultat de l'API (Debug)
  ansible.builtin.debug:
    msg: "Réponse de l'API : {{ api_result.content }}"